[program:webapp]
command=/bin/bash -c "while ! timeout 1 bash -c 'echo > /dev/tcp/127.0.0.1/636' 2>/dev/null; do sleep 1; done && source /etc/samba-conductor.env && exec node main.js"
directory=/opt/app
# Runs as root: samba-tool requires access to /var/lib/samba/private/
autostart=true
autorestart=true
priority=30
startretries=10
startsecs=5
environment=NODE_ENV="production",NODE_TLS_REJECT_UNAUTHORIZED="0",PATH="/opt/nodejs/bin:/opt/mongodb/bin:%(ENV_PATH)s"
stdout_logfile=/data/logs/app/webapp-stdout.log
stderr_logfile=/data/logs/app/webapp-stderr.log
